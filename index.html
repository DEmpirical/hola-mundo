<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola Mundo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: fadeIn 1s ease-in;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .counter {
            margin-top: 2rem;
            font-size: 1.5rem;
        }

        .counter button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 5px 15px;
            margin: 0 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .counter button:hover {
            background: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 Hola Mundo</h1>
        <p>Esta es una aplicación web de ejemplo creada por Bizarro.</p>
        <a href="https://github.com/DEmpirical/hola-mundo" class="btn" target="_blank">Ver en GitHub</a>

        <div class="counter">
            <p>Has hecho clic <span id="clicks">0</span> veces</p>
            <button onclick="increment()">➕ Hazme clic</button>
        </div>
    </div>

    <script>
        let count = localStorage.getItem('clickCount') || 0;
        document.getElementById('clicks').textContent = count;

        function increment() {
            count++;
            document.getElementById('clicks').textContent = count;
            localStorage.setItem('clickCount', count);
        }
    </script>
</body>
</html>
